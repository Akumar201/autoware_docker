# Custom Autoware stack: ROS 2 + Autoware Core (Debian). Same DDS env in all
# containers so ros2 topic echo/Hz work from host exec or sidecar.
#
# Mounts the whole autoware workspace (the folder that contains docker-env).
# From docker-env/ that is the parent dir (..). Override: AUTOWARE_WORKSPACE=/path
#
# Usage:
#   cd ~/autoware/docker-env && docker compose build && docker compose up -d
#   ls /workspace  → autoware  autoware_data  autoware_map  docker-env

services:
  autoware:
    build: .
    image: autoware-custom:latest
    container_name: autoware-custom
    network_mode: host
    gpus: all
    # Without this, Docker overlays an empty tmpfs on e.g. /sys/devices/virtual/powercap,
    # so /sys/class/powercap/intel-rapl:0 symlinks break and RAPL energy_uj is missing.
    # Lighter than privileged: see `docker run --security-opt systempaths=unconfined`.
    security_opt:
      - systempaths=unconfined
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=${XAUTHORITY:-/home/developer/.Xauthority}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=<CycloneDDS><Domain><General><Interfaces><NetworkInterface address="127.0.0.1"/></Interfaces><AllowMulticast>false</AllowMulticast></General><SharedMemory><Enable>false</Enable></SharedMemory><Discovery><ParticipantIndex>auto</ParticipantIndex><MaxAutoParticipantIndex>120</MaxAutoParticipantIndex></Discovery></Domain></CycloneDDS>
    volumes:
      - ${AUTOWARE_WORKSPACE:-..}:/workspace:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # RAPL (CPU energy): use security_opt systempaths=unconfined above — bind-mounting
      # powercap alone is not enough; Docker masks sysfs and symlinks stay broken.
      # If energy_uj is 0400 and you run as non-root: sudo chmod a+r /sys/class/powercap/*/energy_uj
    working_dir: /workspace
    command: ["bash"]
